<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#180d28"/>
      <stop offset="1" stop-color="#0c0514"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="22%" r="65%">
      <stop offset="0" stop-color="#d4a843" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#d4a843" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#e8c76a"/>
      <stop offset="1" stop-color="#d4a843"/>
    </linearGradient>
  </defs>

  <!-- Dark rounded tile -->
  <rect x="2" y="2" width="60" height="60" rx="14" fill="url(#tile)"/>
  <rect x="2" y="2" width="60" height="60" rx="14" fill="url(#glow)"/>
  <!-- Gold hairline frame -->
  <rect x="4.5" y="4.5" width="55" height="55" rx="11.5" fill="none" stroke="#d4a843" stroke-opacity="0.55" stroke-width="1.4"/>

  <!-- Thai 8-point diamond-star ornament (brand motif), top accent -->
  <path d="M32 8 L34 12.4 L38.4 12.4 L35 15.4 L36.4 19.8 L32 17.2 L27.6 19.8 L29 15.4 L25.6 12.4 L30 12.4 Z" fill="url(#gold)"/>

  <!-- TB monogram in serif, gold -->
  <text x="32" y="42.5" text-anchor="middle" font-family="'Playfair Display', Georgia, 'Times New Roman', serif"
        font-size="27" font-weight="700" letter-spacing="-1" fill="url(#gold)">TB</text>

  <!-- Gold divider flourish beneath the monogram -->
  <rect x="20" y="49.5" width="24" height="1.4" rx="0.7" fill="#d4a843" fill-opacity="0.7"/>
</svg>
